services:
  - type: web
    name: avatarx-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python run.py"
    envVars:
      - key: DEEPSEEK_API_KEY
        value: sk-f673372f9afe4a82a632d72de7097576
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: CHROMA_PERSIST_DIRECTORY
        value: /opt/render/project/src/data/chroma
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/data/avatars.db
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
